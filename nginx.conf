# nginx config for the static resolve.works site.
# TLS terminates upstream, so this only listens on :80 and serves files.

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root   /usr/share/nginx/html;
    charset utf-8;

    # Directory requests resolve to index.html (trailingSlash='always' output).
    index  index.html;

    # --- gzip text-based responses --------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # --- fingerprintable / static assets: long, immutable cache ---------------
    # _app/immutable/* is content-hashed; the named css/js/webp/font files at
    # the root are deployed as part of a new image.
    location ~* \.(?:css|js|webp|svg|woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # --- embeddings.json: regenerated when content changes, never cache --------
    location = /embeddings.json {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # --- HTML and everything else: never cache so new deploys are picked up ----
    # try_files makes /articles/ serve its index.html and /articles 301-redirect
    # to the slashed URL via nginx's default directory handling.
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # --- custom 404 page -------------------------------------------------------
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
}
